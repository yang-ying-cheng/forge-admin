<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主色渐变 -->
    <linearGradient id="forgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#409EFF"/>
      <stop offset="100%" style="stop-color:#304156"/>
    </linearGradient>
  </defs>

  <!-- 六边形背景 + 白色描边 -->
  <polygon points="32,4 56,16 56,48 32,60 8,48 8,16"
           fill="url(#forgeGrad)"
           stroke="#fff"
           stroke-width="1"
           opacity="0.9"/>

  <!-- F 字符 -->
  <text x="32" y="46"
        font-family="Arial, sans-serif"
        font-size="36"
        font-weight="bold"
        fill="#fff"
        text-anchor="middle">F</text>

  <!-- 顶部小三角装饰 -->
  <polygon points="32,8 38,14 26,14" fill="#fff" opacity="0.4"/>
</svg>