# 开发环境配置
server:
  port: 8181

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/forge_admin?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: password

  data:
    redis:
      host: localhost
      port: 6379
      password:

# 文件存储配置
file:
  storage:
    type: local
    local:
      path: /tmp/forge-admin/upload
      url-prefix: http://localhost:8181/api/file/

# JustAuth 第三方登录配置
justauth:
  type:
    wechat:
      client-id: ${WECHAT_APP_ID:}
      client-secret: ${WECHAT_APP_SECRET:}
      redirect-uri: ${WECHAT_REDIRECT_URI:http://localhost:3003/api/auth/social/callback/wechat}
    dingtalk:
      client-id: ${DINGTALK_APP_KEY:}
      client-secret: ${DINGTALK_APP_SECRET:}
      redirect-uri: ${DINGTALK_REDIRECT_URI:http://localhost:3003/api/auth/social/callback/dingtalk}

# 日志级别
logging:
  level:
    com.forge: debug
    com.forge.modules.system.mapper: info

# 等保安全策略（开发环境覆盖）
forge:
  security:
    captcha:
      enabled: true
