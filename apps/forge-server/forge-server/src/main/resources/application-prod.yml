# 生产环境配置 - 符合二级等保要求
# 重要：敏感配置项应使用 ENC() 加密或环境变量注入

server:
  port: ${SERVER_PORT:8181}
  # 生产环境关闭错误详情暴露
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: never

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    # 生产环境连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      lettuce:
        pool:
          min-idle: 5
          max-idle: 10
          max-active: 20
          max-wait: 5s

  # 生产环境关闭 actuator 不必要的端点
  management:
    endpoints:
      web:
        exposure:
          include: health,info
    endpoint:
      health:
        show-details: never

# 文件存储配置（生产环境应使用云存储）
file:
  storage:
    type: ${FILE_STORAGE_TYPE:oss}
    local:
      path: ${FILE_UPLOAD_PATH}
      url-prefix: ${FILE_BASE_URL}
    oss:
      endpoint: ${OSS_ENDPOINT}
      access-key: ${OSS_ACCESS_KEY}
      secret-key: ${OSS_SECRET_KEY}
      bucket: ${OSS_BUCKET}

# JustAuth 第三方登录配置
justauth:
  type:
    wechat:
      client-id: ${WECHAT_APP_ID}
      client-secret: ${WECHAT_APP_SECRET}
      redirect-uri: ${WECHAT_REDIRECT_URI}
    dingtalk:
      client-id: ${DINGTALK_APP_KEY}
      client-secret: ${DINGTALK_APP_SECRET}
      redirect-uri: ${DINGTALK_REDIRECT_URI}

# 日志配置 - 生产环境
logging:
  level:
    com.forge: info
    org.springframework.security: warn
    org.springframework.web: warn
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: ${LOG_PATH}/forge-admin.log
    max-size: 50MB
    max-history: 90
    total-size-cap: 10GB

# 等保安全策略（生产环境强制启用）
forge:
  security:
    captcha:
      enabled: true
      length: 4
      expire-seconds: 300
      width: 120
      height: 40
    password:
      min-length: 8
      max-length: 32
      require-uppercase: true
      require-lowercase: true
      require-digit: true
      require-special: true
      history-size: 5
      expire-days: 90
      bcrypt-strength: 12
      aes-key: ${APP_AES_KEY}
      random-password-length: 12
    login:
      max-fail-count: 5
      lock-minutes: 15
      single-session: true
      max-concurrent-sessions: 3
    upload:
      max-size: 10485760
      allowed-extensions:
        - jpg
        - jpeg
        - png
        - gif
        - webp
        - bmp
        - pdf
        - doc
        - docx
        - xls
        - xlsx
        - ppt
        - pptx
        - txt
        - csv
        - md
        - json
      enable-magic-check: true
    cors-allowed-origins:
      # 生产环境应配置具体的域名，不建议使用 *
      - ${CORS_ALLOWED_ORIGIN_1}
      - ${CORS_ALLOWED_ORIGIN_2}
    sensitive-data-masking: true

# JWT 配置（生产环境必须使用强密钥）
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:7200000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  header: Authorization
  prefix: Bearer

# Jasypt 配置加密密钥（通过启动参数传入）
# java -jar forge-server.jar -Djasypt.encryptor.password=${JASYPT_PASSWORD}
jasypt:
  encryptor:
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator