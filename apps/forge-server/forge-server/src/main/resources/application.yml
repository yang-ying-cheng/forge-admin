server:
  port: ${SERVER_PORT:8181}

spring:
  application:
    name: ${PROJECT_NAME:forge-admin}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:forge_admin}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

forge:
  info:
    base-package: com.forge
  web:
    admin-api:
      prefix: /admin-api
      controller: "**.controller.admin.**"
    app-api:
      prefix: /app-api
      controller: "**.controller.app.**"
  wx:
    mini-app-id: ${WX_MINI_APP_ID:}
    mini-app-secret: ${WX_MINI_APP_SECRET:}
  sms:
    code-length: 6
    code-ttl-seconds: 300
    send-cooldown-seconds: 60
    daily-limit: 5
    verify-error-limit: 5
  security:
    captcha:
      enabled: true
      length: 4
      expire-seconds: 300
      width: 120
      height: 40
    password:
      min-length: 8
      max-length: 32
      require-uppercase: true
      require-lowercase: true
      require-digit: true
      require-special: true
      history-size: 5
      expire-days: 90
      bcrypt-strength: 12
      aes-key: ${APP_AES_KEY:default-aes-key-change-in-prod-32bytes!}
      random-password-length: 12
    login:
      max-fail-count: 5
      lock-minutes: 15
      single-session: true
      max-concurrent-sessions: 3
    upload:
      max-size: 10485760
      allowed-extensions:
        - jpg
        - jpeg
        - png
        - gif
        - webp
        - bmp
        - pdf
        - doc
        - docx
        - xls
        - xlsx
        - ppt
        - pptx
        - txt
        - csv
        - md
        - json
      enable-magic-check: true
    cors-allowed-origins:
      - "*"
    sensitive-data-masking: true

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.forge.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
   # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false # 关闭控制台的 Banner 打印

# Flowable 工作流引擎配置
flowable:
  database-schema-update: true
  history-level: full
  async-executor-activate: true
  process-definition-location-prefix: classpath*:/processes/

# Knife4j配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.forge.modules

knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT配置
jwt:
  secret: ${JWT_SECRET:standadmin-jwt-secret-key-must-be-at-least-256-bits-long}
  expiration: ${JWT_EXPIRATION:7200000} # 2小时
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7天
  header: Authorization
  prefix: Bearer

# 日志配置
logging:
  level:
    com.forge: ${LOG_LEVEL:debug}
    org.springframework.security: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: ${LOG_PATH:logs}/forge-admin.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# 文件上传配置
file:
  upload-path: ${FILE_UPLOAD_PATH:./uploads}
  base-url: ${FILE_BASE_URL:http://localhost:8181/uploads}

# AI模块配置
ai:
  enabled: ${AI_ENABLED:true}
  python-service:
    base-url: ${AI_PYTHON_SERVICE_URL:http://localhost:8000}
    connect-timeout: ${AI_PYTHON_CONNECT_TIMEOUT:5000}
    read-timeout: ${AI_PYTHON_READ_TIMEOUT:60000}
    enabled: ${AI_PYTHON_ENABLED:true}
  models:
    default-model: ${AI_DEFAULT_MODEL:deepseek-chat}
    default-temperature: ${AI_DEFAULT_TEMPERATURE:0.7}
    default-max-tokens: ${AI_DEFAULT_MAX_TOKENS:4096}
    cache-enabled: ${AI_MODEL_CACHE_ENABLED:true}
    cache-expire-seconds: ${AI_MODEL_CACHE_EXPIRE:3600}
