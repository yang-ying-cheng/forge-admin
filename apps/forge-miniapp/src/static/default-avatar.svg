<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变：柔和的蓝灰色调 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eef3"/>
      <stop offset="100%" style="stop-color:#d4dde6"/>
    </linearGradient>

    <!-- 用户图标渐变 -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff"/>
      <stop offset="100%" style="stop-color:#0055d4"/>
    </linearGradient>

    <!-- 外圈光晕效果 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 主圆形背景 -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGradient)" stroke="#c5d0db" stroke-width="2"/>

  <!-- 用户头部圆形 -->
  <circle cx="100" cy="72" r="28" fill="url(#iconGradient)" opacity="0.85"/>

  <!-- 用户身体（简化的人形轮廓） -->
  <path d="M 100 105
           C 65 105 45 130 45 155
           L 45 165
           Q 45 172 52 172
           L 148 172
           Q 155 172 155 165
           L 155 155
           C 155 130 135 105 100 105 Z"
        fill="url(#iconGradient)"
        opacity="0.85"/>

  <!-- 底部微妙的弧线装饰 -->
  <path d="M 30 180 Q 100 190 170 180"
        stroke="#007aff"
        stroke-width="1.5"
        fill="none"
        opacity="0.3"/>

  <!-- 外圈装饰点 -->
  <circle cx="100" cy="8" r="3" fill="#007aff" opacity="0.4"/>
</svg>